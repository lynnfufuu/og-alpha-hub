<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>og-alpha-hub</title>
  
  <style>
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .animate-moving-bg {
      background: linear-gradient(-45deg, #04070a, #07120e, #05090d, #091c12) !important;
      background-size: 400% 400% !important;
      animation: gradientMove 12s ease infinite !important;
      background-attachment: fixed !important;
    }
    @keyframes buttonPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.4); }
      50% { transform: scale(0.94); box-shadow: 0 0 12px 4px rgba(0, 255, 102, 0.2); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
    }
    .active-click-pulse {
      animation: buttonPulse 0.2s ease-out !important;
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    .shimmer-bg {
      position: relative;
      overflow: hidden;
      background-color: rgba(255, 255, 255, 0.02) !important;
    }
    .shimmer-bg::after {
      position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      transform: translateX(-100%);
      background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 20%, rgba(255,255,255,0.06) 60%, rgba(255,255,255,0) 100%);
      animation: shimmer 1.5s infinite;
      content: '';
    }
    .shimmer-line {
      height: 14px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
    }
  </style>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
